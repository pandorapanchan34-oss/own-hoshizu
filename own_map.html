<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Own(星図) - 星図</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#000; color:#fff; font-family:'Courier New',Courier,monospace; overflow:hidden; width:100vw; height:100vh; }
.header {
  position:fixed; top:0; left:0; right:0; padding:16px 24px;
  display:flex; justify-content:space-between; align-items:center; z-index:100;
  background:linear-gradient(to bottom,rgba(0,0,0,0.95) 0%,transparent 100%);
}
.header-title { font-size:0.85rem; letter-spacing:0.3rem; color:#333; }
.header-right { display:flex; gap:16px; align-items:center; }
.header-info { font-size:0.68rem; color:#2a2a2a; letter-spacing:0.1rem; }
.back-btn {
  font-size:0.7rem; color:#2a2a2a; letter-spacing:0.1rem;
  background:none; border:1px solid #111; padding:6px 12px;
  cursor:pointer; font-family:'Courier New',monospace;
  transition:all 0.2s; text-decoration:none; display:inline-block;
}
.back-btn:hover { border-color:#444; color:#666; }
#starCanvas { display:block; width:100vw; height:100vh; cursor:crosshair; }
.my-panel {
  position:fixed; bottom:24px; left:24px; border:1px solid #111;
  padding:16px 20px; background:rgba(0,0,0,0.95); min-width:210px; z-index:100;
}
.my-panel-label { font-size:0.58rem; color:#2a2a2a; letter-spacing:0.2rem; margin-bottom:8px; }
.my-star-name { font-size:1rem; color:#fff; margin-bottom:6px; }
.my-fobs { font-size:0.62rem; color:#333; line-height:1.8; }
.tooltip {
  position:fixed; background:rgba(0,0,0,0.97); border:1px solid #1a1a1a;
  padding:10px 14px; font-size:0.7rem; color:#888; pointer-events:none; display:none; z-index:200; line-height:1.8;
}
.tooltip .tt-name { font-size:0.88rem; color:#fff; margin-bottom:2px; }
.tooltip .tt-coord { color:#333; font-size:0.62rem; }
.axis-label { position:fixed; font-size:0.58rem; color:#111; letter-spacing:0.12rem; pointer-events:none; }
.ax-xr { bottom:50%; right:18px; transform:translateY(50%); }
.ax-xl { bottom:50%; left:18px; transform:translateY(50%); }
.ax-yt { top:65px; left:50%; transform:translateX(-50%); }
.ax-yb { bottom:75px; left:50%; transform:translateX(-50%); }
.loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.72rem; color:#222; letter-spacing:0.2rem; }
</style>
</head>
<body>
<div class="header">
  <div class="header-title">Own(星図)</div>
  <div class="header-right">
    <div class="header-info" id="star-count"></div>
    <a class="back-btn" href="index.html">← 戻る</a>
  </div>
</div>
<div class="loading" id="loading">星図を展開中...</div>
<canvas id="starCanvas"></canvas>
<div class="axis-label ax-xr">高 →</div>
<div class="axis-label ax-xl">← 低　F + O</div>
<div class="axis-label ax-yt">B + S ↑ 高</div>
<div class="axis-label ax-yb">↓ 低</div>
<div class="my-panel" id="my-panel" style="display:none;">
  <div class="my-panel-label">// あなたの星</div>
  <div class="my-star-name" id="my-name">—</div>
  <div class="my-fobs" id="my-fobs"></div>
</div>
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-coord" id="tt-coord"></div>
</div>

<script src="own-storage.js"></script>
<script>
const S = OwnStorage;
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [], myStarData = null, frame = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const toX = x => (x/100)*(canvas.width*0.84) + canvas.width*0.08;
const toY = y => canvas.height - ((y/100)*(canvas.height*0.74) + canvas.height*0.11);

function senseColor(s, a) {
  s = Math.max(0,Math.min(100,s||50));
  return `rgba(${Math.round(20+(220-20)*(s/100))},${Math.round(30+(215-30)*(s/100))},${Math.round(80+(195-80)*(s/100))},${a})`;
}
function orderSize(o) { return 1.2 + (Math.max(0,Math.min(100,o||50))/100)*5; }

function drawGrid() {
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  for (let i=1;i<10;i++) {
    ctx.beginPath(); ctx.moveTo(toX(i*10),0); ctx.lineTo(toX(i*10),canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,toY(i*10)); ctx.lineTo(canvas.width,toY(i*10)); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.beginPath(); ctx.moveTo(toX(50),0); ctx.lineTo(toX(50),canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,toY(50)); ctx.lineTo(canvas.width,toY(50)); ctx.stroke();
}

function drawStar(star, isMe, pulse) {
  const px = toX(star.x), py = toY(star.y);
  const sz = orderSize(star.size) + (isMe ? Math.sin(pulse*0.04)*1.5 : 0);
  const gr = isMe ? sz*7 : sz*3.5;
  const ga = isMe ? 0.22 : 0.06;
  const g = ctx.createRadialGradient(px,py,0,px,py,gr);
  g.addColorStop(0, senseColor(star.color, ga));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(px,py,gr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = senseColor(star.color, isMe?1:0.55);
  ctx.beginPath(); ctx.arc(px,py,sz,0,Math.PI*2); ctx.fill();
  if (star.vis==='public' && star.name && star.name!=='名無し') {
    ctx.fillStyle = isMe?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.2)';
    ctx.font = isMe?'10px Courier New':'8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(star.name, px, py-sz-5);
  }
}

function drawAll() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  stars.forEach(s => drawStar(s,false,0));
  if (myStarData) drawStar(myStarData,true,frame);
}

function loop() { frame++; drawAll(); requestAnimationFrame(loop); }

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX-r.left, my = e.clientY-r.top;
  let found=null, minD=22;
  [...stars, myStarData].filter(Boolean).forEach(s => {
    const d = Math.hypot(mx-toX(s.x), my-toY(s.y));
    if (d<minD) { minD=d; found=s; }
  });
  const tt = document.getElementById('tooltip');
  if (found) {
    tt.style.display='block';
    tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-10)+'px';
    document.getElementById('tt-name').textContent = found.name||'名無し';
    const f = found.fobs||{};
    document.getElementById('tt-coord').textContent =
      `F:${Math.round(f.frontier??found.x)}  O:${Math.round(f.order??found.size)}  B:${Math.round(f.bond??found.y)}  S:${Math.round(f.sense??found.color)}`;
  } else { tt.style.display='none'; }
});
canvas.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display='none'; });

async function loadStars() {
  try {
    const my = await S.get('own_mystar');
    if (my?.value) {
      myStarData = JSON.parse(my.value);
      document.getElementById('my-panel').style.display = 'block';
      document.getElementById('my-name').textContent = myStarData.name||'名無し';
      const f = myStarData.fobs||{};
      document.getElementById('my-fobs').innerHTML =
        `F: ${Math.round(f.frontier??myStarData.x??0)}　O: ${Math.round(f.order??myStarData.size??0)}<br>B: ${Math.round(f.bond??myStarData.y??0)}　S: ${Math.round(f.sense??myStarData.color??0)}<br><span style="color:#1a1a1a">[ ${myStarData.mbti||'——'} ]</span>`;
    }
  } catch(e){}

  try {
    const keys = await S.list('own_star_', true);
    if (keys?.keys?.length) {
      const results = await Promise.all(
        keys.keys.slice(0,300).map(k => S.get(k,true).then(r=>r?.value?JSON.parse(r.value):null).catch(()=>null))
      );
      stars = results.filter(Boolean);
    }
  } catch(e){}

  const total = stars.length + (myStarData?1:0);
  document.getElementById('star-count').textContent = total>0 ? `${total} 個の星`:'';
  document.getElementById('loading').style.display = 'none';
  loop();
}

loadStars();
</script>
</body>
</html>
